name = "researchbox"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# 自定义域名（自动绑定到本 Worker）
# ============================================================
# surveykit.cc 域名需在 Cloudflare 账户里管理
# wrangler deploy 时会自动创建 DNS 记录和绑定
[[routes]]
pattern = "qq.surveykit.cc"
custom_domain = true

# ============================================================
# 静态资源（前端 SPA）+ API 同源部署
# ============================================================
# 部署流程：
#   1. npm run build（构建前端到 ../dist）
#   2. npx wrangler deploy（同时上传前端静态资源和 Worker 代码）
#
# 路由规则（run_worker_first = true）：
#   所有请求先经过 Worker，Worker 内部判断：
#   - /api/*  → 处理 API 逻辑
#   - 其他路径 → env.ASSETS.fetch(request) 交给静态资源
#   - 未匹配静态资源 → 返回 index.html（SPA fallback）
# ============================================================

[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# ============================================================
# 环境变量（非敏感，敏感的用 wrangler secret put）
# ============================================================
[vars]
AI_MODEL = "deepseek-v4-flash"
AI_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
AI_TIMEOUT_MS = "120000"
# 同源部署后 CORS 白名单可简化（前端和 API 同域）
# 保留 localhost 用于本地开发调试
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:8788"
AUTH_ENABLED = "false"
