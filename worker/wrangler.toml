name = "researchbox-ai-proxy"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

# 部署后访问地址：https://researchbox-ai-proxy.<your-subdomain>.workers.dev
# 前端 VITE_AI_API_URL 指向这个地址

# 环境变量（通过 wrangler secret 设置，不写在这里）：
# wrangler secret put DASHSCOPE_API_KEY
# wrangler secret put AI_PROXY_TOKEN    # 可选：简单鉴权 token

# 非敏感配置可以放 vars（可选）：
[vars]
AI_MODEL = "deepseek-v4-flash"
AI_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
AI_TIMEOUT_MS = "120000"
# 前端部署后的域名，用于 CORS（多个用逗号分隔）
ALLOWED_ORIGINS = "https://researchbox.pages.dev,http://localhost:5173"

# 如需启用鉴权，设为 true 并配置 AI_PROXY_TOKEN
AUTH_ENABLED = "false"

# 可选：使用 D1 数据库替代本地 SQLite（鉴权功能需要）
# [[d1_databases]]
# binding = "DB"
# database_name = "researchbox"
# database_id = "your-d1-database-id"
